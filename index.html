<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quality Quest · Rakshitha Narasimhaiah · SDET / AI Quality Engineer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#191a2e;
  --brick-red:#e3413a;
  --brick-yel:#f7c518;
  --brick-blu:#2f6fce;
  --brick-grn:#4caf50;
  --paper:#fffef8;
  --comic:'Bangers', cursive;
  --body:'Nunito', system-ui, sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--body);color:var(--ink);background:var(--ink);overflow-x:hidden}
#scroll-space{width:100%;pointer-events:none}
#stage{position:fixed;inset:0;overflow:hidden;will-change:transform}

.bg{position:absolute;inset:0;opacity:0;will-change:opacity}
.bg::after{content:'';position:absolute;inset:0;opacity:.12;
  background-image:radial-gradient(var(--ink) 1.4px,transparent 1.5px);background-size:22px 22px}
.bg-0{background:linear-gradient(#aee3f7 0%,#8ed4f2 60%,#c9ecd8 100%)}
.bg-1{background:linear-gradient(#f9d976 0%,#f7b267 55%,#f4845f 100%)}
.bg-2{background:linear-gradient(#9fd8f0 0%,#bfe8ff 55%,#d8f3e3 100%)}
.bg-3{background:linear-gradient(#2f6fce 0%,#4d8fe0 55%,#7fb4ee 100%)}
.bg-4{background:linear-gradient(#2a9fc4 0%,#0e6e94 45%,#07425c 100%)}
.bg-5{background:radial-gradient(ellipse at 50% 25%,#454a7d 0%,#26284a 60%,#181a33 100%)}
.bg-6{background:linear-gradient(#3a2b5c 0%,#57407d 55%,#241b3d 100%)}
.bg-7{background:linear-gradient(#12406b 0%,#1c5a8e 55%,#0d2c4a 100%)}
.bubble{position:absolute;border-radius:50%;border:3px solid rgba(255,255,255,.6);
  background:rgba(255,255,255,.12);animation:rise 6s linear infinite}
@keyframes rise{0%{transform:translateY(0)}100%{transform:translateY(-90vh)}}
.seaweed{position:absolute;bottom:13%;width:15px;height:130px;background:#2fa070;
  border:3px solid var(--ink);border-radius:10px;transform-origin:bottom;animation:sway 3.6s ease-in-out infinite}
@keyframes sway{0%,100%{transform:rotate(-7deg)}50%{transform:rotate(7deg)}}
.coral-d{position:absolute;bottom:13%;font-size:52px}

/* parallax layers */
.plx{position:absolute;top:0;left:0;height:100%;will-change:transform;pointer-events:none}
.far-hill{position:absolute;bottom:11%;border-radius:50% 50% 0 0;opacity:.35;background:#1d5c8f}
.far-cloud{position:absolute;background:rgba(255,255,255,.85);border-radius:60px}
.far-cloud::before{content:'';position:absolute;width:52%;height:120%;left:16%;top:-50%;
  background:rgba(255,255,255,.85);border-radius:50%}

#world{position:absolute;top:0;left:0;height:100%;will-change:transform}
.level{position:absolute;top:0;height:100%}

.plate{position:absolute;bottom:0;left:0;right:0;height:13%;
  background:var(--brick-grn);border-top:6px solid rgba(0,0,0,.35)}
.plate::before{content:'';position:absolute;top:12px;left:0;right:0;height:22px;
  background-image:radial-gradient(circle at 11px 11px, rgba(255,255,255,.4) 8px, rgba(0,0,0,.18) 9px, transparent 10px);
  background-size:44px 22px}
.plate.gray{background:#9aa0ad}.plate.tan{background:#d9b26a}.plate.dark{background:#3b3f63}

/* ---------- HUD ---------- */
#hud{position:fixed;top:0;left:0;right:0;display:flex;align-items:center;gap:16px;
  padding:12px 18px;z-index:60;pointer-events:none}
#hud .hearts{display:flex;gap:5px}
#hud .hearts span{width:18px;height:18px;background:var(--brick-red);
  clip-path:path('M9 17 L1.5 9.5 A4.6 4.6 0 0 1 9 3.2 A4.6 4.6 0 0 1 16.5 9.5 Z');
  filter:drop-shadow(1px 2px 0 rgba(0,0,0,.4))}
#hud .title{font-family:var(--comic);font-size:24px;letter-spacing:2px;color:#fff;
  -webkit-text-stroke:1.5px var(--ink);text-shadow:3px 3px 0 var(--ink)}
#studcount{font-family:var(--comic);font-size:20px;letter-spacing:1px;color:var(--brick-yel);
  -webkit-text-stroke:1px var(--ink);text-shadow:2px 2px 0 var(--ink);display:flex;align-items:center;gap:7px}
#studcount .coin{width:20px;height:20px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#ffe98f,var(--brick-yel) 70%);
  border:3px solid var(--ink);display:inline-block}
#level-label{font-family:var(--comic);font-size:17px;letter-spacing:1px;color:var(--brick-yel);
  -webkit-text-stroke:1px var(--ink);text-shadow:2px 2px 0 var(--ink);margin-left:auto;text-align:right;line-height:1.15}
#xpwrap{position:fixed;top:52px;left:18px;right:18px;height:10px;background:rgba(0,0,0,.4);
  border:2px solid var(--ink);border-radius:8px;z-index:60;overflow:hidden}
#xp{height:100%;width:0%;background:repeating-linear-gradient(90deg,var(--brick-yel) 0 18px,#ffd95e 18px 36px)}
#scroll-hint{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
  font-family:var(--comic);font-size:19px;letter-spacing:1px;color:#fff;
  -webkit-text-stroke:1px var(--ink);text-shadow:2px 2px 0 var(--ink);
  z-index:60;animation:hint 1.3s ease-in-out infinite;pointer-events:none;opacity:0;transition:opacity .5s}
@keyframes hint{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(7px)}}

/* ---------- comic pieces ---------- */
.panel{position:absolute;background:var(--paper);border:4px solid var(--ink);border-radius:10px;
  padding:16px 18px;box-shadow:8px 8px 0 rgba(0,0,0,.35);max-width:310px}
.panel h3{font-family:var(--comic);font-size:21px;letter-spacing:1px;line-height:1.1;margin-bottom:4px}
.panel .sub{font-weight:900;font-size:14px;color:var(--brick-red)}
.panel .dates{font-size:12px;font-weight:800;color:#6b6d8a;margin:2px 0 7px}
.panel p{font-size:13.5px;line-height:1.45;font-weight:600}
.panel .tags{margin-top:9px;display:flex;flex-wrap:wrap;gap:5px}
.panel .tags span{font-size:10.5px;font-weight:900;background:var(--brick-blu);color:#fff;
  padding:2px 9px;border-radius:4px;border:2px solid var(--ink)}
.caption{position:absolute;background:var(--brick-yel);border:4px solid var(--ink);
  font-family:var(--comic);letter-spacing:1px;padding:8px 16px;font-size:19px;
  box-shadow:6px 6px 0 rgba(0,0,0,.35);transform:rotate(-2deg)}
.burst{position:absolute;font-family:var(--comic);color:#fff;-webkit-text-stroke:2px var(--ink);
  text-shadow:4px 4px 0 var(--ink);letter-spacing:2px}

.speech{position:absolute;background:#fff;border:4px solid var(--ink);border-radius:22px;
  padding:14px 18px;max-width:300px;font-weight:800;font-size:16px;line-height:1.4;
  box-shadow:6px 6px 0 rgba(0,0,0,.3);
  opacity:0;transform:translateY(24px) scale(.7);transition:all .4s cubic-bezier(.2,1.5,.4,1)}
.speech::after{content:'';position:absolute;bottom:-22px;left:38px;width:26px;height:26px;
  background:#fff;border-right:4px solid var(--ink);border-bottom:4px solid var(--ink);
  transform:skewX(35deg) rotate(45deg)}
.speech.show{opacity:1;transform:translateY(0) scale(1)}
.speech b{color:var(--brick-red)}

/* ---------- platforms & collectibles ---------- */
.platform{position:absolute;height:34px;background:var(--brick-red);border:4px solid var(--ink);border-radius:6px}
.platform::before{content:'';position:absolute;top:-15px;left:6px;right:6px;height:13px;
  background-image:radial-gradient(circle at 50% 100%, transparent 0, transparent 0);
  display:flex}
.platform .studs{position:absolute;top:-16px;left:8px;right:8px;height:14px;display:flex;gap:10px}
.platform .studs i{flex:1;max-width:34px;background:inherit;border:3.5px solid var(--ink);border-bottom:none;border-radius:4px 4px 0 0;background:var(--brick-red)}
.collect{position:absolute;width:56px;height:56px;display:flex;align-items:center;justify-content:center;
  font-size:30px;background:#fff;border:4px solid var(--ink);border-radius:50%;
  box-shadow:5px 5px 0 rgba(0,0,0,.3);transition:transform .3s,opacity .3s}
.collect.got{transform:scale(0) rotate(180deg);opacity:0}
.popcard{opacity:0;transform:translateY(18px) scale(.85);transition:all .45s cubic-bezier(.2,1.5,.4,1)}
.popcard.show{opacity:1;transform:translateY(0) scale(1)}

.stud-coin{position:absolute;width:30px;height:30px;border-radius:50%;
  background:radial-gradient(circle at 35% 30%,#ffe98f,var(--brick-yel) 72%);
  border:4px solid var(--ink);box-shadow:0 0 14px rgba(247,197,24,.7);
  transition:transform .25s,opacity .25s;animation:coinbob 1.8s ease-in-out infinite}
.stud-coin::after{content:'';position:absolute;inset:6px;border-radius:50%;border:2.5px solid rgba(25,26,46,.5)}
.stud-coin.got{transform:scale(0);opacity:0}
@keyframes coinbob{0%,100%{margin-top:0}50%{margin-top:-9px}}

/* ---------- LEGO skyline ---------- */
.bldg{position:absolute;bottom:13%;border:4px solid var(--ink)}
.bldg .studs{position:absolute;top:-16px;left:6px;right:6px;height:14px;display:flex;gap:8px}
.bldg .studs i{flex:1;background:inherit;border:3px solid var(--ink);border-bottom:none;border-radius:3px 3px 0 0}
.bldg .win{position:absolute;background:#fff8c9;border:2.5px solid var(--ink);width:16%;height:6%}
#wtower .pole{position:absolute;bottom:0;left:42%;width:16%;height:60%;background:#c9ced9;border:4px solid var(--ink)}
#wtower .legs{position:absolute;bottom:0;left:8%;width:84%;height:52%;
  border-left:4px solid var(--ink);border-right:4px solid var(--ink);transform:perspective(70px) rotateX(4deg)}
#wtower .tank{position:absolute;bottom:52%;left:0;width:100%;height:34%;border-radius:46% 46% 34% 34%;
  background:linear-gradient(#eef2f9,#aeb6c6);border:4px solid var(--ink);
  display:flex;align-items:center;justify-content:center;
  font-family:var(--comic);font-size:21px;letter-spacing:2px;color:var(--ink)}
#wtower .cap{position:absolute;bottom:85%;left:34%;width:32%;height:9%;
  border-radius:50% 50% 0 0;background:#aeb6c6;border:4px solid var(--ink);border-bottom:none}

/* ---------- skill bricks ---------- */
.lbrick{position:absolute;border:4px solid var(--ink);border-radius:6px;
  box-shadow:7px 7px 0 rgba(0,0,0,.35);padding:12px 16px 10px;min-width:190px}
.lbrick .bstuds{position:absolute;top:-17px;left:10px;display:flex;gap:9px}
.lbrick .bstuds i{width:26px;height:15px;background:inherit;border:3.5px solid var(--ink);
  border-bottom:none;border-radius:4px 4px 0 0}
.lbrick .nm{font-family:var(--comic);font-size:19px;letter-spacing:1px;color:#fff;
  -webkit-text-stroke:.8px var(--ink);text-shadow:2px 2px 0 rgba(0,0,0,.35)}
.lbrick .lvl{display:flex;gap:5px;margin-top:5px}
.lbrick .lvl i{width:13px;height:13px;border-radius:50%;border:2.5px solid var(--ink);background:rgba(255,255,255,.35)}
.lbrick .lvl i.f{background:#fff}
.c-red{background:var(--brick-red)}.c-blu{background:var(--brick-blu)}
.c-yel{background:var(--brick-yel)}.c-grn{background:var(--brick-grn)}
.c-org{background:#f4845f}.c-pur{background:#8e6fce}

.spot{position:absolute;top:0;width:340px;height:80%;pointer-events:none;
  background:linear-gradient(rgba(255,240,180,.3),rgba(255,240,180,0));
  clip-path:polygon(40% 0,60% 0,100% 100%,0 100%)}
.ach{width:300px;text-align:center;transition:opacity .5s,transform .5s}
.ach .big{font-size:36px}
.ach.dim{opacity:.45;transform:scale(.94)}

.setbox{width:300px;background:var(--brick-red);color:#fff;border-radius:8px}
.setbox .lego-tab{font-family:var(--comic);background:var(--brick-yel);color:var(--ink);
  display:inline-block;padding:3px 12px;border:3px solid var(--ink);border-radius:4px;
  font-size:15px;letter-spacing:1px;margin-bottom:8px}
.setbox h3{color:#fff}
.setbox p{color:#ffe9e7}
.setbox .pieces{font-size:11px;font-weight:900;color:var(--brick-yel);margin-top:8px}
.setbox a{display:inline-block;margin-top:10px;font-family:var(--comic);font-size:16px;letter-spacing:1px;
  color:var(--ink);background:var(--brick-yel);padding:7px 14px;border:3px solid var(--ink);border-radius:6px;
  text-decoration:none;pointer-events:auto;box-shadow:4px 4px 0 rgba(0,0,0,.35)}
.setbox a:hover{transform:translateY(-2px)}

#finale{position:absolute;top:8%;width:100%;height:84%;display:flex;align-items:center;
  justify-content:center;gap:44px;padding:0 30px;flex-wrap:wrap}
#finale .fin-left{text-align:center;max-width:560px}
#finale h2{font-family:var(--comic);font-size:clamp(34px,5vw,58px);letter-spacing:3px;color:var(--brick-yel);
  -webkit-text-stroke:2px var(--ink);text-shadow:5px 5px 0 var(--ink)}
#finale p{color:#eaf3fb;font-size:16px;font-weight:800;margin:12px auto 22px;max-width:460px}
.cta-row{display:flex;gap:14px;justify-content:center;flex-wrap:wrap}
.cta{font-family:var(--comic);font-size:19px;letter-spacing:1px;padding:12px 20px;border-radius:8px;
  text-decoration:none;border:4px solid var(--ink);box-shadow:6px 6px 0 rgba(0,0,0,.4);
  pointer-events:auto;transition:transform .15s}
.cta:hover{transform:translateY(-3px)}
.cta.gh{background:var(--brick-yel);color:var(--ink)}
.cta.li{background:var(--brick-blu);color:#fff}
.cta.cv{background:var(--brick-red);color:#fff}
.cta.again{background:#fff;color:var(--ink)}
#trophy{font-size:64px;display:inline-block;animation:bob 2.4s ease-in-out infinite}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}

/* contact form */
#msgpanel{margin:0;flex:0 0 380px;max-width:400px;max-height:82vh;overflow-y:auto;
  background:var(--paper);border:4px solid var(--ink);
  border-radius:12px;padding:16px 18px;box-shadow:8px 8px 0 rgba(0,0,0,.4);text-align:left;pointer-events:auto}
#msgpanel h3{font-family:var(--comic);font-size:21px;letter-spacing:1px;margin-bottom:3px}
#msgpanel .hint{font-size:12px;font-weight:700;color:#6b6d8a;margin-bottom:8px}
#msgpanel label{display:block;font-family:var(--comic);font-size:14px;letter-spacing:1px;margin:8px 0 3px}
#msgpanel input,#msgpanel textarea{width:100%;border:3px solid var(--ink);border-radius:8px;
  padding:8px 11px;font-family:var(--body);font-weight:700;font-size:14px;background:#fff;
  box-shadow:inset 3px 3px 0 rgba(0,0,0,.08)}
#msgpanel input:focus,#msgpanel textarea:focus{outline:3px solid var(--brick-yel)}
#msgpanel textarea{min-height:70px;resize:vertical}
#msgbtn{margin-top:11px;width:100%;font-family:var(--comic);font-size:19px;letter-spacing:1px;
  background:var(--brick-grn);color:#fff;border:4px solid var(--ink);border-radius:8px;
  padding:10px;cursor:pointer;box-shadow:5px 5px 0 rgba(0,0,0,.35);transition:transform .15s}
#msgbtn:hover{transform:translateY(-2px)}
#msgbtn:disabled{opacity:.6;cursor:wait}
#msgstatus{margin-top:10px;font-family:var(--comic);font-size:16px;letter-spacing:1px;text-align:center;min-height:20px}
#msgstatus.ok{color:var(--brick-grn)}
#msgstatus.err{color:var(--brick-red)}
.hp{position:absolute;left:-9999px;opacity:0;height:0;overflow:hidden}

/* title card: staggered letters */
#titlecard{position:fixed;top:14%;left:50%;transform:translateX(-50%);z-index:55;
  text-align:center;pointer-events:none}
#titlecard .ln{display:block;font-family:var(--comic);font-size:clamp(40px,7vw,84px);
  letter-spacing:4px;color:#fff;-webkit-text-stroke:2.5px var(--ink);
  text-shadow:6px 6px 0 var(--ink);line-height:1.05}
#titlecard .ln span{display:inline-block;opacity:0;transform:translateY(-60px) rotate(-8deg) scale(1.6)}
#titlecard .ln span.in{opacity:1;transform:none;transition:all .45s cubic-bezier(.2,1.6,.4,1)}
#titlecard .role{display:inline-block;margin-top:12px;font-family:var(--comic);font-size:clamp(18px,2.4vw,26px);
  letter-spacing:2px;background:var(--brick-red);color:#fff;padding:6px 18px;border:4px solid var(--ink);
  border-radius:8px;box-shadow:5px 5px 0 rgba(0,0,0,.35);transform:rotate(-2deg) scale(0);
  transition:transform .5s cubic-bezier(.2,1.7,.4,1)}
#titlecard .role.in{transform:rotate(-2deg) scale(1)}

/* particles */
.pt{position:fixed;pointer-events:none;z-index:58;will-change:transform,opacity}
.pt.dustp{width:12px;height:12px;border-radius:50%;background:#fff;border:3px solid var(--ink)}
.pt.sparkp{width:9px;height:9px;border-radius:50%;background:var(--brick-yel);
  box-shadow:0 0 10px 3px rgba(247,197,24,.8)}
.pt.confp{width:11px;height:16px;border:2.5px solid var(--ink)}
.pop{position:fixed;z-index:58;font-family:var(--comic);font-size:26px;letter-spacing:1px;
  color:var(--brick-yel);-webkit-text-stroke:1.2px var(--ink);text-shadow:3px 3px 0 var(--ink);
  pointer-events:none;will-change:transform,opacity}

.cloud{position:absolute;background:#fff;border-radius:60px;border:4px solid var(--ink)}
.star{position:absolute;width:4px;height:4px;background:#fff;border-radius:50%;opacity:.85}
.world-link{pointer-events:auto}

#crawly{position:fixed;left:22vw;bottom:0;width:120px;height:190px;z-index:40;will-change:transform}
#crawly svg{overflow:visible}
#flipwrap{transform-origin:60px 105px}

@media (max-width:700px){
  #crawly{left:12vw;width:88px;height:140px}
  .panel{max-width:230px;padding:12px}
  #level-label,#studcount{display:none}
  .speech{max-width:220px;font-size:14px}
}
@media (prefers-reduced-motion:reduce){
  .cloud,#trophy,#scroll-hint,.stud-coin{animation:none!important}
}
</style>
</head>
<body>

<div id="scroll-space"></div>

<div id="stage">
  <div class="bg bg-0"></div><div class="bg bg-1"></div><div class="bg bg-2"></div>
  <div class="bg bg-3"></div><div class="bg bg-4"></div><div class="bg bg-5"></div>
  <div class="bg bg-6"></div><div class="bg bg-7"></div>
  <div class="plx" id="plx-far"></div>
  <div class="plx" id="plx-mid"></div>
  <div id="world"></div>
</div>

<div id="hud">
  <div class="hearts"><span></span><span></span><span></span></div>
  <div class="title">QUALITY QUEST</div>
  <div id="studcount"><span class="coin"></span><span id="studnum">0</span></div>
  <div id="level-label">LEVEL 0 · ABOUT ME</div>
</div>
<div id="xpwrap"><div id="xp"></div></div>
<div id="scroll-hint">SCROLL TO PLAY!</div>

<div id="titlecard">
  <span class="ln" data-t="RAKSHITHA"></span>
  <span class="ln" data-t="NARASIMHAIAH"></span>
  <span class="role">SDET · AI QUALITY ENGINEER</span>
</div>

<div id="crawly">
  <svg viewBox="0 0 120 190" width="120" height="190">
    <g id="flipwrap">
    <g id="rig" transform="translate(60,105)">
      <g id="chute" opacity="1">
        <path d="M-52,-118 A52 44 0 0 1 52,-118 L38,-104 L24,-116 L8,-104 L-8,-116 L-24,-104 L-38,-116 Z"
          fill="#e3413a" stroke="#191a2e" stroke-width="4"/>
        <path d="M-52,-118 A52 44 0 0 1 52,-118" fill="none" stroke="#191a2e" stroke-width="4"/>
        <line x1="-44" y1="-108" x2="-16" y2="-46" stroke="#191a2e" stroke-width="3"/>
        <line x1="44" y1="-108" x2="16" y2="-46" stroke="#191a2e" stroke-width="3"/>
      </g>
      <g id="armL" transform-origin="-14 -40">
        <path d="M-14,-42 q-13,4 -12,26 l10,2 q0,-16 8,-22 z" fill="#3a3f4d" stroke="#191a2e" stroke-width="3.5"/>
        <circle cx="-21" cy="-9" r="8" fill="#b5714a" stroke="#191a2e" stroke-width="3.5"/>
        <circle cx="-21" cy="-9" r="3" fill="none" stroke="#191a2e" stroke-width="2.5"/>
      </g>
      <g id="legL" transform-origin="-8 8">
        <rect x="-17" y="6" width="17" height="34" rx="3" fill="#2f6fce" stroke="#191a2e" stroke-width="3.5"/>
        <rect x="-19" y="38" width="21" height="12" rx="2" fill="#191a2e"/>
      </g>
      <g id="legR" transform-origin="8 8">
        <rect x="0" y="6" width="17" height="34" rx="3" fill="#2f6fce" stroke="#191a2e" stroke-width="3.5"/>
        <rect x="-2" y="38" width="21" height="12" rx="2" fill="#191a2e"/>
      </g>
      <rect x="-16" y="0" width="32" height="10" rx="2" fill="#26559e" stroke="#191a2e" stroke-width="3.5"/>
      <path d="M-15,-44 L15,-44 L19,2 L-19,2 Z" fill="#3a3f4d" stroke="#191a2e" stroke-width="4"/>
      <path d="M-7,-44 L0,-30 L7,-44 Z" fill="#fffef8" stroke="#191a2e" stroke-width="3"/>
      <g id="head" transform-origin="0 -46">

   const sway=Math.sin(t/420)*7;
   P.crawly.style.transform=`translate3d(${sway*2}px,${-rig.y}px,0)`;
   P.rig.setAttribute('transform',`translate(60,105) rotate(${sway})`);
   P.armL.setAttribute('transform','rotate(-165)');
   P.armR.setAttribute('transform','rotate(165)');
   P.legL.setAttribute('transform','rotate(6)');P.legR.setAttribute('transform','rotate(-6)');
   if(k>=1){landing=false;shake=1.2;
     const r=P.crawly.getBoundingClientRect();
     burstDust(r.left+55,r.top+165);
     slamTitle();hint.style.opacity=1;
     rig.sy=0.75;rig.sx=1.25; /* squash on land */
   }
   tickParts(dt);requestAnimationFrame(frame);return;
 }
 if(P.chute.getAttribute('opacity')!=='0'){
   P.chute.style.transition='opacity .5s';P.chute.style.opacity=0;P.chute.setAttribute('opacity','0');}
 tc.style.opacity=sY>40?0:1;tc.style.transition='opacity .4s';
 hint.style.opacity=sY>60?0:1;

 /* facing with hysteresis */
 if(vel>1.5)facing=1;else if(vel<-1.5)facing=-1;

 tgt.y=groundY;tgt.rot=0;tgt.sx=1;tgt.sy=1;
 state=Math.abs(vel)<0.5?'idle':'walk';
 let airborne=false;

 /* L0 speech bubbles */
 if(li===0){const rel=wpos-starts[0];
   speeches.forEach((s,i)=>{const b=document.querySelector(`[data-sp="${i}"]`);
     if(rel>s.x-140)b.classList.add('show');});}

 /* L1 platform hops */
 if(li===1){
   const rel=wpos-starts[1];
   let py=groundY;
   for(let i=0;i<plats.length;i++){
     const p=plats[i],x0=p[0],x1=p[0]+p[2];
     if(rel>=x0&&rel<=x1){py=H()*(1-p[1]/100)+6;break}
     const nx=plats[i+1];
     if(nx&&rel>x1&&rel<nx[0]){
       const jt=(rel-x1)/(nx[0]-x1);
       const y0=H()*(1-p[1]/100)+6,y1=H()*(1-nx[1]/100)+6;
       py=lerp(y0,y1,jt)+Math.sin(jt*Math.PI)*120;airborne=true;break}
     if(i===0&&rel<x0){const jt=rel/x0;
       if(jt>.62){py=lerp(groundY,H()*(1-p[1]/100)+6,(jt-.62)/.38);airborne=jt<.98}}
   }
   const last=plats[plats.length-1];
   if(rel>last[0]+last[2]){
     const back=Math.min(1,(rel-(last[0]+last[2]))/320);
     py=lerp(H()*(1-last[1]/100)+6,groundY,back);airborne=back<0.96;}
   tgt.y=py;
   if(airborne)state='jump';
   collects.forEach((c,i)=>{
     if(!got.has(i)&&Math.abs(rel-(c.x+28))<75){
       got.add(i);
       L1.querySelector(`[data-c="${i}"]`).classList.add('got');
       L1.querySelector(`[data-p="${i}"]`).classList.add('show');
       const r=P.crawly.getBoundingClientRect();
       burstSpark(r.left+55,r.top+60);popText('GOT IT!',r.left+30,r.top-10);
     }});
 }
 /* landing squash when air->ground */
 if(airPrev&&!airborne&&li===1){
   rig.sy=0.72;rig.sx=1.26;shake=0.6;
   const r=P.crawly.getBoundingClientRect();burstDust(r.left+55,r.top+165);
 }
 airPrev=airborne;

 /* L4 underwater swim */
 if(li===4){
   if(lp<0.05){state='jump';tgt.y=lerp(groundY,H()*0.46,lp/0.05);
     if(!splashed&&lp>0.02){splashed=true;
       const r=P.crawly.getBoundingClientRect();
       popText('SPLASH!',r.left+10,r.top+40);burstDust(r.left+55,r.top+120);}}
   else if(lp>0.94){state='jump';tgt.y=lerp(H()*0.46,groundY,(lp-0.94)/0.06)}
   else{state='swim';tgt.y=H()*0.46+Math.sin(t/600)*16}
 } else splashed=false;

 /* L5 achievements spotlight */
 if(li===5){const rel=wpos-starts[5];
   document.querySelectorAll('[data-ach]').forEach((c,i)=>{
     const cx=480+i*490+150;
     c.classList.toggle('dim',Math.abs(rel-cx)>320)});}

 /* finale confetti */
 if(li===7&&!confettiDone){confettiDone=true;confetti()}

 /* stud coins */
 coinDefs.forEach(cd=>{
   if(!gotCoins.has(cd.i)&&Math.abs(wpos-cd.wx)<55){
     gotCoins.add(cd.i);studs++;studnum.textContent=studs;
     document.querySelector(`[data-coin="${cd.i}"]`).classList.add('got');
     const r=P.crawly.getBoundingClientRect();
     burstSpark(r.left+55,r.top+70);popText('+1',r.left+70,r.top+10);
   }});

 /* ---- pose (phase driven by SPEED so no moonwalk) ---- */
 const spd=Math.min(1,Math.abs(vel)/22);
 phase+=Math.abs(vel)*0.05;
 const osc=reduced?0.25:1;
 if(state==='walk'){
   const s=Math.sin(phase);
   tgt.legL=s*30*spd*osc;tgt.legR=-s*30*spd*osc;
   tgt.armL=-s*24*spd*osc;tgt.armR=s*24*spd*osc;
   tgt.head=s*2*spd;tgt.rot=Math.abs(vel)*0.18*facing*0+Math.min(10,Math.abs(vel)*0.25);
 }else if(state==='jump'){
   tgt.legL=22;tgt.legR=-14;tgt.armL=-130;tgt.armR=-40;tgt.head=-4;tgt.rot=8;
   tgt.sy=1.1;tgt.sx=0.94;
 }else if(state==='swim'){
   tgt.rot=72;swimSpin+=(5+spd*15)*osc;
   tgt.armL=swimSpin%360;tgt.armR=(swimSpin+180)%360;
   const fl=Math.sin(t/140)*13*osc;
   tgt.legL=fl;tgt.legR=-fl;tgt.head=8;
 }else{
   const b=Math.sin(t/650);
   tgt.legL=0;tgt.legR=0;tgt.armL=b*3;tgt.armR=-b*3;tgt.head=b*2;tgt.rot=0;
   waveT+=dt;
   if(waveT>5200){const wv=(waveT-5200)/900;
     if(wv<1)tgt.armR=-155+Math.sin(wv*Math.PI*4)*16;else waveT=0}
 }
 const k=0.15;
 for(const key of ['y','rot','legL','legR','head'])rig[key]=lerp(rig[key],tgt[key],k);
 if(state==='swim'){rig.armL=tgt.armL;rig.armR=tgt.armR}
 else{rig.armL=lerp(rig.armL,tgt.armL,k);rig.armR=lerp(rig.armR,tgt.armR,k)}
 rig.sx=lerp(rig.sx,tgt.sx,0.12);rig.sy=lerp(rig.sy,tgt.sy,0.12);

 P.crawly.style.transform=`translate3d(0,${-rig.y}px,0)`;
 P.flip.setAttribute('transform',`translate(60,105) scale(${facing*rig.sx} ${rig.sy}) translate(-60,-105)`);
 P.rig.setAttribute('transform',`translate(60,105) rotate(${rig.rot})`);
 P.armL.setAttribute('transform',`rotate(${rig.armL})`);
 P.armR.setAttribute('transform',`rotate(${rig.armR})`);
 P.legL.setAttribute('transform',`rotate(${rig.legL})`);
 P.legR.setAttribute('transform',`rotate(${rig.legR})`);
 P.head.setAttribute('transform',`rotate(${rig.head})`);

 tickParts(dt);
 requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

const ACCESS_KEY='eb42bea2-8d11-4582-a9c2-f43ef9b874f7';
function mailtoSend(name,email,body,st){
 const subject=encodeURIComponent('Quality Quest message from '+name);
 const mail=encodeURIComponent(body+'\n\nFrom: '+name+' ('+email+')');
 const url=`mailto:${MY_EMAIL}?subject=${subject}&body=${mail}`;
 /* hidden iframe trigger: opens the mail app WITHOUT navigating this page */

 setTimeout(()=>{st.textContent='EMAIL APP NOT OPENING? USE THE LINK BELOW!'},4000);
}
document.addEventListener('click',async e=>{
 if(e.target.id!=='msgbtn')return;
 const name=document.getElementById('mf-name').value.trim();
 const email=document.getElementById('mf-email').value.trim();
 const body=document.getElementById('mf-body').value.trim();
 const hp=document.getElementById('mf-hp').value;
 const st=document.getElementById('msgstatus');
 if(hp)return;
 if(!name||!email||!body){st.className='err';st.textContent='FILL ALL THREE FIELDS!';return}
 if(!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)){st.className='err';st.textContent='THAT EMAIL LOOKS OFF!';return}
 const btn=e.target;
 if(ACCESS_KEY.includes('PASTE_YOUR')){mailtoSend(name,email,body,st);return}
 btn.disabled=true;st.className='';st.textContent='SENDING...';
 try{
   const res=await fetch('https://api.web3forms.com/submit',{method:'POST',
     headers:{'Content-Type':'application/json','Accept':'application/json'},
     body:JSON.stringify({access_key:ACCESS_KEY,subject:'Quality Quest message from '+name,
       name,email,message:body})});
   if(res.ok){st.className='ok';st.textContent='SENT! ACHIEVEMENT UNLOCKED 🏅';
     document.getElementById('mf-name').value='';
     document.getElementById('mf-email').value='';
     document.getElementById('mf-body').value='';
     confetti();}
   else mailtoSend(name,email,body,st);
 }catch(err){mailtoSend(name,email,body,st)}
 btn.disabled=false;
});
